    <text x="110" y="292" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700">Backordered and Emergency</text>
    <text x="110" y="358" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700">Medical Supply Sourcing</text>
    <text x="110" y="436" fill="#d8dde5" font-family="Arial, Helvetica, sans-serif" font-size="28">Federal-ready RFQ support for hard-to-find medical, dental,</text>
    <text x="110" y="476" fill="#d8dde5" font-family="Arial, Helvetica, sans-serif" font-size="28">laboratory, PPE, technology, and operational products.</text>
