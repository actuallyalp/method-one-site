<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Method One Solutions medical supply sourcing preview</title>
  <desc id="desc">Branded preview for Method One Solutions backordered and emergency medical supply sourcing.</desc>
  <defs>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070b"/>
      <stop offset="0.55" stop-color="#101820"/>
      <stop offset="1" stop-color="#2a0608"/>
    </linearGradient>
    <radialGradient id="signal" cx="72%" cy="42%" r="52%">
      <stop offset="0" stop-color="#8e090b" stop-opacity="0.52"/>
      <stop offset="0.55" stop-color="#8e090b" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#8e090b" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#field)"/>
  <rect width="1200" height="630" fill="url(#signal)"/>
  <g opacity="0.18">
